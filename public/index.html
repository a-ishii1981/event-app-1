<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>イベント販売記録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0c29; }
    #loading {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);
      color: #f0eeff; font-family: 'Noto Sans JP', sans-serif;
    }
    #loading .icon { font-size: 48px; margin-bottom: 16px; }
    #loading .msg  { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    #loading .sub  { font-size: 12px; color: #9b8fff; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="icon">🛍️</div>
    <div class="msg">読み込み中...</div>
    <div class="sub">アプリを初期化しています</div>
  </div>
  <div id="root"></div>

  <script>
    window.storage = {
      async get(key) {
        try {
          const res = await fetch("/api/storage/" + encodeURIComponent(key));
          const json = await res.json();
          return { value: json.value };
        } catch { return { value: null }; }
      },
      async set(key, value) {
        try {
          await fetch("/api/storage/" + encodeURIComponent(key), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ value })
          });
        } catch {}
      }
    };
  </script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── ストレージキー ──────────────────────────────────────────
    const EVENTS_KEY  = "ev_events_v1";
    const RECORDS_KEY = "ev_records_v1";
    const WS_KEY      = "ev_workspace_v1";

    // ─── ストレージ ──────────────────────────────────────────────
    async function storageSave(k, v) {
      try { await window.storage.set(k, JSON.stringify(v)); } catch {}
      try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
    }
    async function storageLoad(k, fb) {
      try { const r = await window.storage.get(k); if (r?.value != null) return JSON.parse(r.value) ?? fb; } catch {}
      try { return JSON.parse(localStorage.getItem(k) || "null") ?? fb; } catch { return fb; }
    }

    // ─── ヘルパー ────────────────────────────────────────────────
    const pad = n => String(n).padStart(2, "0");
    const fmtYen = n => `¥${Math.round(n).toLocaleString("ja-JP")}`;
    function localDateStr(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
    function fmtDate(s) {
      if (!s || !/^\d{4}-\d{2}-\d{2}$/.test(s)) return s || "";
      const d = new Date(s + "T00:00:00");
      return isNaN(d.getTime()) ? s : d.toLocaleDateString("ja-JP", {year:"numeric",month:"long",day:"numeric",weekday:"short"});
    }
    function fmtDateShort(s) {
      if (!s || !/^\d{4}-\d{2}-\d{2}$/.test(s)) return s || "";
      const d = new Date(s + "T00:00:00");
      return isNaN(d.getTime()) ? s : d.toLocaleDateString("ja-JP", {month:"long",day:"numeric",weekday:"short"});
    }
    function fmtJapanDateRange(start, end) {
      if (!start) return "";
      const s = new Date(start + "T00:00:00");
      const e = end ? new Date(end + "T00:00:00") : null;
      const y = s.getFullYear(), sm = s.getMonth()+1, sd = s.getDate();
      if (!e) return `${y}年${sm}月${sd}日`;
      if (s.getFullYear()===e.getFullYear() && s.getMonth()===e.getMonth())
        return `${y}年${sm}月${sd}日〜${e.getDate()}日`;
      return `${y}年${sm}月${sd}日〜${e.getMonth()+1}月${e.getDate()}日`;
    }

    // ─── 集計関数 ────────────────────────────────────────────────
    function calcSales(rec) {
      return (rec?.products || []).reduce((s, p) => s + (parseInt(p.count)||0)*(parseInt(p.price)||0), 0);
    }
    function calcExpenses(rec) {
      return (rec?.expenses || []).reduce((s, e) => s + (parseInt(e.amount)||0), 0);
    }
    function calcProfit(rec) { return calcSales(rec) - calcExpenses(rec); }

    // ─── 日報テキスト生成 ────────────────────────────────────────
    function generateReport(event, dateStr, rec) {
      if (!event || !dateStr) return "";
      const lines = [];
      const wsLabel = event.workspace === "jigyou" ? "【自分の事業】" : "【バイト】";
      lines.push(`${wsLabel} ${event.name}　${event.location || ""}`);
      lines.push(fmtDate(dateStr));
      lines.push("");
      lines.push("■ 売上記録");
      const products = rec?.products || [];
      const validProducts = products.filter(p => p.name || p.count || p.price);
      if (validProducts.length === 0) {
        lines.push("（記録なし）");
      } else {
        validProducts.forEach(p => {
          const cnt = parseInt(p.count)||0, prc = parseInt(p.price)||0;
          lines.push(`${p.name||"（商品名なし）"}　${cnt}個 × ${fmtYen(prc)} = ${fmtYen(cnt*prc)}`);
        });
      }
      lines.push(`売上合計: ${fmtYen(calcSales(rec))}`);
      lines.push("");
      lines.push("■ 経費");
      const expenses = rec?.expenses || [];
      const validExpenses = expenses.filter(e => e.name || e.amount);
      if (validExpenses.length === 0) {
        lines.push("（なし）");
      } else {
        validExpenses.forEach(e => lines.push(`${e.name||"（経費名なし）"}　${fmtYen(parseInt(e.amount)||0)}`));
      }
      lines.push(`経費合計: ${fmtYen(calcExpenses(rec))}`);
      const profit = calcProfit(rec);
      lines.push(`【利益】${fmtYen(profit)}`);
      lines.push("");
      const memos = [
        ["customerReactions",   "■ お客様の反応"],
        ["frequentQuestions",   "■ よく聞かれた質問"],
        ["displayImprovements", "■ POP・売場改善の反応"],
        ["nextImprovements",    "■ 次回改善点"],
      ];
      memos.forEach(([field, label]) => {
        if (rec?.[field]) { lines.push(label); lines.push(rec[field]); lines.push(""); }
      });
      return lines.join("\n");
    }

    // ─── 共通スタイル ────────────────────────────────────────────
    const IS = {
      background: "rgba(255,255,255,0.08)",
      border: "1px solid rgba(138,101,255,0.35)",
      borderRadius: 8,
      padding: "8px 12px",
      color: "#fff",
      fontSize: 14,
      boxSizing: "border-box",
      outline: "none",
      width: "100%",
      fontFamily: "'Noto Sans JP', sans-serif",
    };
    const CARD = {
      background: "rgba(255,255,255,0.04)",
      borderRadius: 16,
      padding: "16px 18px",
      marginBottom: 14,
      border: "1px solid rgba(255,255,255,0.07)",
    };

    const TABS = ["記録", "イベント", "日報", "集計"];

    // ─── DateSelector ─────────────────────────────────────────────
    function DateSelector({ selectedDate, setSelectedDate, today, records, selectedEventId }) {
      const todayDate = new Date(today + "T00:00:00");
      const endOfWeek = new Date(todayDate);
      endOfWeek.setDate(endOfWeek.getDate() + (6 - todayDate.getDay()));
      const days = [];
      for (let i = 34; i >= 0; i--) {
        const d = new Date(endOfWeek);
        d.setDate(d.getDate() - i);
        days.push(localDateStr(d));
      }
      const parts = selectedDate.split("-");
      const [manualY, setManualY] = useState(parts[0]);
      const [manualM, setManualM] = useState(parts[1]);
      const [manualD, setManualD] = useState(parts[2]);
      useEffect(() => {
        const p = selectedDate.split("-");
        setManualY(p[0]); setManualM(p[1]); setManualD(p[2]);
      }, [selectedDate]);
      function applyManual() {
        const s = `${manualY}-${manualM.padStart(2,"0")}-${manualD.padStart(2,"0")}`;
        if (/^\d{4}-\d{2}-\d{2}$/.test(s) && !isNaN(new Date(s))) setSelectedDate(s);
      }
      const weeks = [];
      for (let w = 0; w < 5; w++) weeks.push(days.slice(w*7, w*7+7));
      const DOW = ["日","月","火","水","木","金","土"];
      return (
        <div style={{...CARD,marginBottom:14}}>
          <div style={{fontSize:11,color:"#9b8fff",letterSpacing:2,marginBottom:12,fontWeight:700}}>📅 記録日</div>
          <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:12}}>
            <input value={manualY} onChange={e=>setManualY(e.target.value)} onBlur={applyManual} maxLength={4}
              style={{...IS,width:64,textAlign:"center",padding:"8px 4px",fontSize:13}} />
            <span style={{color:"#9b8fff",fontSize:12}}>年</span>
            <input value={manualM} onChange={e=>setManualM(e.target.value)} onBlur={applyManual} maxLength={2}
              style={{...IS,width:44,textAlign:"center",padding:"8px 4px",fontSize:13}} />
            <span style={{color:"#9b8fff",fontSize:12}}>月</span>
            <input value={manualD} onChange={e=>setManualD(e.target.value)} onBlur={applyManual} maxLength={2}
              style={{...IS,width:44,textAlign:"center",padding:"8px 4px",fontSize:13}} />
            <span style={{color:"#9b8fff",fontSize:12}}>日</span>
            <button onClick={applyManual}
              style={{background:"rgba(138,101,255,0.5)",border:"none",color:"#fff",borderRadius:8,padding:"8px 12px",fontSize:13,cursor:"pointer",fontWeight:700}}>→</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
            {DOW.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:10,color:i===0?"#f87171":i===6?"#60a5fa":"#9b8fff",fontWeight:700,padding:"2px 0"}}>{d}</div>)}
          </div>
          {weeks.map((week,wi)=>(
            <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
              {week.map(ds=>{
                const rk = selectedEventId ? `${selectedEventId}_${ds}` : null;
                const hasRec = rk && records[rk] && (calcSales(records[rk])>0 || records[rk].customerReactions);
                const isToday = ds===today, isSel = ds===selectedDate;
                const dow = new Date(ds+"T00:00:00").getDay();
                return (
                  <button key={ds} onClick={()=>setSelectedDate(ds)} style={{
                    padding:"6px 2px",borderRadius:8,border:"none",cursor:"pointer",position:"relative",
                    background:isSel?"rgba(138,101,255,0.85)":hasRec?"rgba(251,146,60,0.2)":"rgba(255,255,255,0.05)",
                    color:isSel?"#fff":isToday?"#fbbf24":dow===0?"#f87171":dow===6?"#60a5fa":"#d0c8ff",
                    fontSize:12,fontWeight:isToday||isSel?700:400,
                    outline:isToday&&!isSel?"1px solid rgba(251,191,36,0.5)":"none",
                  }}>
                    {new Date(ds+"T00:00:00").getDate()}
                    {hasRec&&!isSel&&<div style={{width:4,height:4,borderRadius:"50%",background:"#fb923c",position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)"}}/>}
                  </button>
                );
              })}
            </div>
          ))}
          <div style={{marginTop:8,padding:"8px 12px",background:"rgba(138,101,255,0.15)",borderRadius:10,fontSize:13,fontWeight:700,textAlign:"center",color:"#c4b5ff"}}>
            {fmtDateShort(selectedDate)}
          </div>
        </div>
      );
    }

    // ─── RecordTab ────────────────────────────────────────────────
    function RecordTab({ events, records, setRecords, selectedEventId, setSelectedEventId, selectedDate, setSelectedDate, today, setTab, workspace }) {
      const selectedEvent = events.find(e=>e.id===selectedEventId) || null;
      const recKey = selectedEventId ? `${selectedEventId}_${selectedDate}` : null;
      const rec = recKey ? (records[recKey] || {}) : {};
      function updateRec(patch) {
        if (!recKey) return;
        setRecords(prev=>({...prev,[recKey]:{...(prev[recKey]||{}),...patch}}));
      }
      const products = rec.products || [{ name:"", count:"", price:"" }];
      const expenses = rec.expenses || [];
      const totalSales = calcSales(rec);
      const totalExpenses = calcExpenses(rec);
      const profit = totalSales - totalExpenses;

      return (
        <div>
          {/* イベント表示 */}
          <div style={{background:"rgba(255,255,255,0.06)",borderRadius:16,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>🛍️</span>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:"#9b8fff",letterSpacing:2}}>
                現在のイベント　{workspace==="baito"?"【バイト】":"【自分の事業】"}
              </div>
              <div style={{fontSize:14,fontWeight:700}}>
                {selectedEvent ? `${selectedEvent.name}${selectedEvent.location ? "　"+selectedEvent.location : ""}` : "（未選択）"}
              </div>
            </div>
            <button onClick={()=>setTab(1)} style={{background:"rgba(138,101,255,0.3)",border:"1px solid rgba(138,101,255,0.5)",color:"#c4b5ff",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>変更</button>
          </div>

          {!selectedEventId ? (
            <div style={{textAlign:"center",padding:"48px 0",color:"#9b8fff"}}>
              <div style={{fontSize:48,marginBottom:12}}>📅</div>
              <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>まずイベントを選択してください</div>
              <button onClick={()=>setTab(1)} style={{background:"rgba(138,101,255,0.7)",border:"none",color:"#fff",borderRadius:10,padding:"10px 28px",fontSize:14,cursor:"pointer",fontWeight:700}}>イベント一覧へ</button>
            </div>
          ) : (
            <>
              <DateSelector selectedDate={selectedDate} setSelectedDate={setSelectedDate} today={today} records={records} selectedEventId={selectedEventId} />

              {/* 商品別売上 */}
              <div style={CARD}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontSize:11,color:"#fb923c",letterSpacing:2,fontWeight:700}}>🛒 商品別売上</div>
                  <div style={{fontSize:15,fontWeight:800,color:"#fb923c"}}>{fmtYen(totalSales)}</div>
                </div>
                {products.map((p,i)=>{
                  const sub = (parseInt(p.count)||0)*(parseInt(p.price)||0);
                  return (
                    <div key={i} style={{marginBottom:10}}>
                      <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:3}}>
                        <input value={p.name||""} onChange={e=>{
                          const np=products.map((x,j)=>j===i?{...x,name:e.target.value}:x);
                          updateRec({products:np});
                        }} placeholder="商品名" style={{...IS,flex:2,fontSize:13,padding:"8px 8px"}} />
                        <input value={p.count||""} onChange={e=>{
                          const np=products.map((x,j)=>j===i?{...x,count:e.target.value}:x);
                          updateRec({products:np});
                        }} placeholder="個数" type="number" style={{...IS,width:56,flex:"none",fontSize:13,padding:"8px 5px"}} />
                        <span style={{color:"#9b8fff",fontSize:12,flexShrink:0}}>×</span>
                        <input value={p.price||""} onChange={e=>{
                          const np=products.map((x,j)=>j===i?{...x,price:e.target.value}:x);
                          updateRec({products:np});
                        }} placeholder="単価" type="number" style={{...IS,width:72,flex:"none",fontSize:13,padding:"8px 5px"}} />
                        <button onClick={()=>updateRec({products:products.filter((_,j)=>j!==i)})}
                          style={{background:"rgba(248,113,113,0.2)",border:"none",color:"#f87171",borderRadius:6,padding:"8px 8px",cursor:"pointer",fontSize:13,flexShrink:0}}>✕</button>
                      </div>
                      {sub>0&&<div style={{fontSize:11,color:"#fb923c",textAlign:"right",marginTop:2}}>
                        {parseInt(p.count)||0}個 × {fmtYen(parseInt(p.price)||0)} = {fmtYen(sub)}
                      </div>}
                    </div>
                  );
                })}
                <button onClick={()=>updateRec({products:[...products,{name:"",count:"",price:""}]})}
                  style={{background:"rgba(251,146,60,0.2)",border:"1px solid rgba(251,146,60,0.4)",color:"#fb923c",borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer",marginTop:4}}>
                  ＋ 商品を追加
                </button>
              </div>

              {/* 経費 */}
              <div style={CARD}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontSize:11,color:"#f87171",letterSpacing:2,fontWeight:700}}>💸 経費</div>
                  <div style={{fontSize:15,fontWeight:800,color:"#f87171"}}>{fmtYen(totalExpenses)}</div>
                </div>
                {expenses.length===0&&<div style={{fontSize:12,color:"#5a5070",marginBottom:10}}>経費なし</div>}
                {expenses.map((e,i)=>(
                  <div key={i} style={{display:"flex",gap:5,alignItems:"center",marginBottom:8}}>
                    <input value={e.name||""} onChange={ev=>{
                      const ne=expenses.map((x,j)=>j===i?{...x,name:ev.target.value}:x);
                      updateRec({expenses:ne});
                    }} placeholder="経費名（例：交通費）" style={{...IS,flex:2,fontSize:13,padding:"8px 8px"}} />
                    <input value={e.amount||""} onChange={ev=>{
                      const ne=expenses.map((x,j)=>j===i?{...x,amount:ev.target.value}:x);
                      updateRec({expenses:ne});
                    }} placeholder="金額" type="number" style={{...IS,flex:1,fontSize:13,padding:"8px 8px"}} />
                    <button onClick={()=>updateRec({expenses:expenses.filter((_,j)=>j!==i)})}
                      style={{background:"rgba(248,113,113,0.2)",border:"none",color:"#f87171",borderRadius:6,padding:"8px 8px",cursor:"pointer",fontSize:13,flexShrink:0}}>✕</button>
                  </div>
                ))}
                <button onClick={()=>updateRec({expenses:[...expenses,{name:"",amount:""}]})}
                  style={{background:"rgba(248,113,113,0.15)",border:"1px solid rgba(248,113,113,0.35)",color:"#f87171",borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>
                  ＋ 経費を追加
                </button>
              </div>

              {/* 集計サマリー */}
              <div style={{background:"linear-gradient(135deg,rgba(251,146,60,0.12),rgba(138,101,255,0.1))",border:"1px solid rgba(251,146,60,0.35)",borderRadius:16,padding:"16px 18px",marginBottom:14}}>
                <div style={{fontSize:11,color:"#9b8fff",marginBottom:10,letterSpacing:2}}>◆ 本日集計</div>
                {[["売上合計","#fb923c",totalSales],["経費合計","#f87171",totalExpenses]].map(([label,col,val])=>(
                  <div key={label} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0"}}>
                    <span style={{color:"#9b8fff"}}>{label}</span>
                    <span style={{color:col,fontWeight:700}}>{fmtYen(val)}</span>
                  </div>
                ))}
                <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",marginTop:10,paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:800,fontSize:15}}>利益</span>
                  <span style={{fontWeight:800,fontSize:22,color:profit>=0?"#22d3a5":"#f87171"}}>{fmtYen(profit)}</span>
                </div>
              </div>

              {/* メモセクション */}
              {[
                ["customerReactions",   "😊 お客様の反応",          "お客様の反応・声をメモ"],
                ["frequentQuestions",   "❓ よく聞かれた質問",      "よく聞かれた質問をメモ"],
                ["displayImprovements", "🏷️ POP・売場改善の反応",   "POPや売場改善に対する反応"],
                ["nextImprovements",    "✅ 次回改善点",             "次回に改善したいことをメモ"],
              ].map(([field, label, placeholder])=>(
                <div key={field} style={{background:"rgba(255,255,255,0.04)",borderRadius:14,padding:"14px 16px",marginBottom:10,border:"1px solid rgba(255,255,255,0.06)"}}>
                  <div style={{fontSize:11,color:"#9b8fff",marginBottom:6,fontWeight:700,letterSpacing:1}}>{label}</div>
                  <textarea
                    value={rec[field]||""}
                    onChange={e=>updateRec({[field]:e.target.value})}
                    rows={3}
                    placeholder={placeholder}
                    style={{...IS,resize:"vertical",fontFamily:"inherit",fontSize:13,lineHeight:1.7}}
                  />
                </div>
              ))}
            </>
          )}
        </div>
      );
    }

    // ─── EventTab ─────────────────────────────────────────────────
    function EventTab({ events, setEvents, allEvents, selectedEventId, setSelectedEventId, workspace, setTab, records }) {
      const [showForm, setShowForm] = useState(false);
      const [editId, setEditId]     = useState(null);
      const [name,     setName]     = useState("");
      const [location, setLocation] = useState("");
      const [date,     setDate]     = useState("");
      const [dateEnd,  setDateEnd]  = useState("");

      function resetForm() { setEditId(null); setName(""); setLocation(""); setDate(""); setDateEnd(""); }
      function openNew()  { resetForm(); setShowForm(true); }
      function openEdit(ev) {
        setEditId(ev.id); setName(ev.name); setLocation(ev.location||"");
        setDate(ev.date||""); setDateEnd(ev.dateEnd||""); setShowForm(true);
      }
      function save() {
        if (!name) return;
        if (editId) {
          setEvents(prev=>prev.map(e=>e.id===editId?{...e,name,location,date,dateEnd}:e));
        } else {
          const ev = { id:Date.now().toString(), workspace, name, location, date, dateEnd };
          setEvents(prev=>[...prev,ev]);
          setSelectedEventId(ev.id);
          setTab(0);
        }
        resetForm(); setShowForm(false);
      }
      function deleteEv(id) {
        if (!window.confirm("このイベントを削除しますか？")) return;
        setEvents(prev=>prev.filter(e=>e.id!==id));
        if (selectedEventId===id) setSelectedEventId(null);
      }

      return (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:15,fontWeight:700}}>
              イベント一覧　<span style={{fontSize:12,color:"#9b8fff",fontWeight:400}}>{workspace==="baito"?"バイト":"自分の事業"}</span>
            </div>
            <button onClick={()=>{showForm?setShowForm(false):openNew();}}
              style={{background:"rgba(138,101,255,0.7)",border:"none",color:"#fff",borderRadius:10,padding:"8px 16px",fontSize:13,cursor:"pointer",fontWeight:700}}>
              {showForm?"✕ 閉じる":"＋ 新規"}
            </button>
          </div>

          {showForm&&(
            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:16,padding:18,marginBottom:14,border:"1px solid rgba(138,101,255,0.3)"}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:14,color:"#c4b5ff"}}>{editId?"✏️ イベント編集":"＋ 新規イベント"}</div>
              {[
                ["イベント名 *","text",name,setName,"例：春の外商フェア"],
                ["場所・会場","text",location,setLocation,"例：新宿三越"],
                ["開始日","date",date,setDate,""],
                ["終了日","date",dateEnd,setDateEnd,""],
              ].map(([label,type,val,set,ph])=>(
                <div key={label} style={{marginBottom:10}}>
                  <div style={{fontSize:11,color:"#9b8fff",marginBottom:4}}>{label}</div>
                  <input type={type} value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={IS} />
                </div>
              ))}
              <button onClick={save}
                style={{width:"100%",background:"rgba(138,101,255,0.8)",border:"none",color:"#fff",borderRadius:10,padding:12,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:4}}>
                {editId?"更新する":"保存して選択"}
              </button>
            </div>
          )}

          {events.length===0&&(
            <div style={{textAlign:"center",color:"#9b8fff",fontSize:14,padding:"48px 0"}}>
              <div style={{fontSize:48,marginBottom:12}}>📭</div>
              イベントがまだありません
            </div>
          )}

          {[...events].sort((a,b)=>(b.date||"")>(a.date||"")?1:-1).map(ev=>{
            const isSelected = selectedEventId===ev.id;
            const evRecs = Object.entries(records).filter(([k])=>k.startsWith(ev.id+"_"));
            const totalSalesEv = evRecs.reduce((s,[,r])=>s+calcSales(r),0);
            const daysWithSales = evRecs.filter(([,r])=>calcSales(r)>0).length;
            const totalProfit = evRecs.reduce((s,[,r])=>s+calcProfit(r),0);
            return (
              <div key={ev.id} onClick={()=>{setSelectedEventId(ev.id);setTab(0);}}
                style={{background:isSelected?"rgba(138,101,255,0.22)":"rgba(255,255,255,0.05)",
                  border:isSelected?"1px solid rgba(138,101,255,0.6)":"1px solid rgba(255,255,255,0.07)",
                  borderRadius:16,padding:"16px 18px",marginBottom:12,cursor:"pointer",transition:"all .2s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{ev.name}</div>
                    {ev.location&&<div style={{fontSize:12,color:"#9b8fff",marginBottom:2}}>📍 {ev.location}</div>}
                    {ev.date&&<div style={{fontSize:11,color:"#7b6fff"}}>{fmtJapanDateRange(ev.date,ev.dateEnd)}</div>}
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    {totalSalesEv>0&&<div style={{fontSize:15,fontWeight:800,color:"#fb923c"}}>{fmtYen(totalSalesEv)}</div>}
                    {totalSalesEv>0&&<div style={{fontSize:12,fontWeight:700,color:totalProfit>=0?"#22d3a5":"#f87171"}}>利益 {fmtYen(totalProfit)}</div>}
                    {daysWithSales>0&&<div style={{fontSize:11,color:"#9b8fff"}}>{daysWithSales}日分</div>}
                  </div>
                </div>
                {isSelected&&<div style={{marginTop:8,fontSize:11,color:"#a89fff",background:"rgba(138,101,255,0.2)",borderRadius:6,padding:"4px 10px",display:"inline-block"}}>✓ 選択中</div>}
                <div style={{display:"flex",gap:6,marginTop:10}} onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>openEdit(ev)}
                    style={{background:"rgba(138,101,255,0.2)",border:"1px solid rgba(138,101,255,0.3)",color:"#c4b5ff",borderRadius:6,padding:"5px 12px",fontSize:11,cursor:"pointer"}}>✏️ 編集</button>
                  <button onClick={()=>deleteEv(ev.id)}
                    style={{background:"rgba(248,113,113,0.15)",border:"1px solid rgba(248,113,113,0.3)",color:"#f87171",borderRadius:6,padding:"5px 12px",fontSize:11,cursor:"pointer"}}>削除</button>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─── ReportTab ─────────────────────────────────────────────────
    function ReportTab({ events, records, today }) {
      const [selEventId, setSelEventId] = useState(events[0]?.id||"");
      const [selDate,    setSelDate]    = useState(today);
      const [copied,     setCopied]     = useState(false);

      const selEvent = events.find(e=>e.id===selEventId)||null;
      const recKey   = selEventId ? `${selEventId}_${selDate}` : null;
      const rec      = recKey ? (records[recKey]||{}) : {};
      const reportText = selEvent ? generateReport(selEvent, selDate, rec) : "";

      async function copyReport() {
        try { await navigator.clipboard.writeText(reportText); setCopied(true); setTimeout(()=>setCopied(false),2000); } catch {}
      }

      return (
        <div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#9b8fff",marginBottom:5}}>イベントを選択</div>
            {events.length===0
              ? <div style={{fontSize:13,color:"#5a5070"}}>イベントがありません</div>
              : <select value={selEventId} onChange={e=>setSelEventId(e.target.value)} style={{...IS,cursor:"pointer"}}>
                  {events.map(e=><option key={e.id} value={e.id} style={{background:"#1e1a3a"}}>{e.name}　{e.location||""}</option>)}
                </select>
            }
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#9b8fff",marginBottom:5}}>日付</div>
            <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={IS} />
          </div>

          {selEvent&&(
            <>
              {/* 集計サマリー */}
              <div style={{background:"linear-gradient(135deg,rgba(251,146,60,0.12),rgba(138,101,255,0.1))",border:"1px solid rgba(251,146,60,0.35)",borderRadius:16,padding:"16px 18px",marginBottom:14}}>
                <div style={{fontSize:11,color:"#9b8fff",marginBottom:10,letterSpacing:2}}>◆ {fmtDateShort(selDate)} の集計</div>
                {[["売上合計","#fb923c",calcSales(rec)],["経費合計","#f87171",calcExpenses(rec)]].map(([label,col,val])=>(
                  <div key={label} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0"}}>
                    <span style={{color:"#9b8fff"}}>{label}</span>
                    <span style={{color:col,fontWeight:700}}>{fmtYen(val)}</span>
                  </div>
                ))}
                <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",marginTop:10,paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:800,fontSize:15}}>利益</span>
                  <span style={{fontWeight:800,fontSize:22,color:calcProfit(rec)>=0?"#22d3a5":"#f87171"}}>{fmtYen(calcProfit(rec))}</span>
                </div>
              </div>

              {/* 日報テキスト */}
              <div style={{background:"rgba(0,0,0,0.3)",borderRadius:14,padding:"14px 16px",marginBottom:14,border:"1px solid rgba(255,255,255,0.08)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:11,color:"#9b8fff",letterSpacing:2,fontWeight:700}}>📋 日報テキスト</div>
                  <button onClick={copyReport}
                    style={{background:copied?"rgba(34,211,165,0.5)":"rgba(138,101,255,0.6)",border:"none",color:"#fff",borderRadius:8,padding:"7px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                    {copied?"✓ コピー済！":"📋 コピー"}
                  </button>
                </div>
                <div style={{fontSize:12,color:"#d0c8ff",lineHeight:1.9,fontFamily:"'Noto Sans JP',monospace",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                  {reportText||<span style={{color:"#5a5070"}}>（データなし）</span>}
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    // ─── SummaryTab ───────────────────────────────────────────────
    function SummaryTab({ events, records, today }) {
      const [month, setMonth] = useState(()=>today.slice(0,7));
      const [copyDone, setCopyDone] = useState(false);

      const eventIds = new Set(events.map(e=>e.id));
      const monthRecs = Object.entries(records).filter(([k])=>{
        const idx = k.indexOf("_");
        if (idx<0) return false;
        const evId = k.slice(0,idx), dateStr = k.slice(idx+1);
        return eventIds.has(evId) && dateStr.startsWith(month);
      });

      const totalSales    = monthRecs.reduce((s,[,r])=>s+calcSales(r),0);
      const totalExpenses = monthRecs.reduce((s,[,r])=>s+calcExpenses(r),0);
      const totalProfit   = totalSales - totalExpenses;
      const daysWithData  = monthRecs.filter(([,r])=>calcSales(r)>0).length;

      const eventTotals = events.map(ev=>{
        const evRecs = monthRecs.filter(([k])=>k.startsWith(ev.id+"_"));
        return { ev, sales:evRecs.reduce((s,[,r])=>s+calcSales(r),0), expenses:evRecs.reduce((s,[,r])=>s+calcExpenses(r),0), days:evRecs.filter(([,r])=>calcSales(r)>0).length };
      }).filter(et=>et.sales>0||et.expenses>0);

      async function copyMonthly() {
        const lines = [
          `${month} 月次集計`, "",
          `売上合計　${fmtYen(totalSales)}`,
          `経費合計　${fmtYen(totalExpenses)}`,
          `利　益　　${fmtYen(totalProfit)}`,
          `稼働日数　${daysWithData}日`,
          "", "■ イベント別内訳",
        ];
        eventTotals.forEach(({ev,sales,expenses,days})=>{
          lines.push(`${ev.name}${ev.location?"　"+ev.location:""}`);
          lines.push(`  売上 ${fmtYen(sales)}　経費 ${fmtYen(expenses)}　利益 ${fmtYen(sales-expenses)}　${days}日`);
        });
        try { await navigator.clipboard.writeText(lines.join("\n")); setCopyDone(true); setTimeout(()=>setCopyDone(false),2000); } catch {}
      }

      return (
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18,flexWrap:"wrap"}}>
            <input type="month" value={month} onChange={e=>setMonth(e.target.value)} style={{...IS,width:"auto"}} />
            <div style={{fontSize:13,color:"#9b8fff"}}>の集計</div>
            <button onClick={copyMonthly}
              style={{background:copyDone?"rgba(34,211,165,0.4)":"rgba(138,101,255,0.4)",border:"none",color:"#fff",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
              {copyDone?"✓ コピー済":"📋 コピー"}
            </button>
          </div>

          {/* サマリーカード */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
            {[
              ["売上合計","💰","#fb923c",fmtYen(totalSales)],
              ["経費合計","💸","#f87171",fmtYen(totalExpenses)],
              ["利益",    "📈","#22d3a5",fmtYen(totalProfit)],
              ["稼働日数","📅","#c4b5ff",`${daysWithData}日`],
            ].map(([label,emoji,col,val])=>(
              <div key={label} style={{background:"rgba(138,101,255,0.15)",borderRadius:14,padding:"16px 18px",border:"1px solid rgba(138,101,255,0.25)"}}>
                <div style={{fontSize:22,marginBottom:4}}>{emoji}</div>
                <div style={{fontSize:18,fontWeight:800,color:col}}>{val}</div>
                <div style={{fontSize:11,color:"#9b8fff",marginTop:2}}>{label}</div>
              </div>
            ))}
          </div>

          {/* イベント別内訳 */}
          {eventTotals.length>0&&(
            <div style={{...CARD,marginBottom:14}}>
              <div style={{fontSize:11,color:"#9b8fff",letterSpacing:2,marginBottom:12,fontWeight:700}}>イベント別内訳</div>
              {eventTotals.map(({ev,sales,expenses,days})=>(
                <div key={ev.id} style={{padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>{ev.name}</div>
                      {ev.location&&<div style={{fontSize:11,color:"#9b8fff"}}>📍 {ev.location}</div>}
                      <div style={{fontSize:11,color:"#7b6fff"}}>{days}日</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#fb923c"}}>{fmtYen(sales)}</div>
                      <div style={{fontSize:11,color:"#f87171"}}>経費 {fmtYen(expenses)}</div>
                      <div style={{fontSize:13,fontWeight:700,color:sales-expenses>=0?"#22d3a5":"#f87171"}}>利益 {fmtYen(sales-expenses)}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {monthRecs.length===0&&(
            <div style={{textAlign:"center",color:"#9b8fff",padding:"48px 0"}}>
              <div style={{fontSize:48,marginBottom:12}}>📊</div>
              <div>この月のデータはありません</div>
            </div>
          )}

          {/* 日別明細 */}
          {monthRecs.length>0&&(
            <div style={CARD}>
              <div style={{fontSize:11,color:"#9b8fff",letterSpacing:2,marginBottom:12,fontWeight:700}}>日別明細</div>
              {[...monthRecs].sort(([a],[b])=>a>b?1:-1).map(([key,rec])=>{
                const idx = key.indexOf("_");
                const evId = key.slice(0,idx), dateStr = key.slice(idx+1);
                const ev = events.find(e=>e.id===evId);
                const sales=calcSales(rec), exp=calcExpenses(rec), prof=sales-exp;
                if (sales===0&&exp===0) return null;
                return (
                  <div key={key} style={{padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:13}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{fontWeight:600}}>{fmtDateShort(dateStr)}</div>
                        {ev&&<div style={{fontSize:11,color:"#9b8fff"}}>{ev.name}</div>}
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{color:"#fb923c",fontWeight:700}}>{fmtYen(sales)}</div>
                        <div style={{fontSize:11,color:"#f87171"}}>経費 {fmtYen(exp)}</div>
                        <div style={{fontSize:12,fontWeight:700,color:prof>=0?"#22d3a5":"#f87171"}}>利益 {fmtYen(prof)}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ─── Main App ─────────────────────────────────────────────────
    function App() {
      const [tab,             setTab]             = useState(0);
      const [workspace,       setWorkspace]       = useState("baito");
      const [events,          setEvents]          = useState([]);
      const [records,         setRecords]         = useState({});
      const [loaded,          setLoaded]          = useState(false);
      const [selectedEventId, setSelectedEventId] = useState(null);
      const today = localDateStr(new Date());
      const [selectedDate, setSelectedDate] = useState(today);

      useEffect(()=>{
        (async()=>{
          const [evs,recs,ws] = await Promise.all([
            storageLoad(EVENTS_KEY,[]),
            storageLoad(RECORDS_KEY,{}),
            storageLoad(WS_KEY,"baito"),
          ]);
          setEvents(Array.isArray(evs)?evs:[]);
          setRecords(recs||{});
          setWorkspace(ws||"baito");
          setLoaded(true);
          document.getElementById("loading").style.display="none";
        })();
      },[]);

      useEffect(()=>{if(loaded) storageSave(EVENTS_KEY,events);},[events,loaded]);
      useEffect(()=>{if(loaded) storageSave(RECORDS_KEY,records);},[records,loaded]);
      useEffect(()=>{if(loaded) storageSave(WS_KEY,workspace);},[workspace,loaded]);

      const filteredEvents = events.filter(e=>e.workspace===workspace);

      function switchWorkspace(ws) {
        setWorkspace(ws);
        setSelectedEventId(null);
        setSelectedDate(today);
      }

      if (!loaded) return null;

      return (
        <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%)",fontFamily:"'Noto Sans JP','Hiragino Kaku Gothic Pro',sans-serif",color:"#f0eeff",display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{width:"100%",maxWidth:480,padding:"20px 20px 0",boxSizing:"border-box"}}>
            {/* ヘッダー */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{fontSize:10,letterSpacing:4,color:"#a89fff",textTransform:"uppercase",marginBottom:3}}>Event Sales Manager</div>
                <div style={{fontSize:22,fontWeight:800,letterSpacing:-1,marginBottom:2}}>イベント販売記録</div>
                <div style={{fontSize:11,color:"#9b8fff"}}>{fmtDateShort(today)}</div>
              </div>
              {/* ワークスペース切り替え */}
              <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
                <div style={{fontSize:10,color:"#9b8fff",letterSpacing:1}}>ワークスペース</div>
                <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.07)",borderRadius:10,padding:3}}>
                  {[["baito","バイト"],["jigyou","事業"]].map(([ws,label])=>(
                    <button key={ws} onClick={()=>switchWorkspace(ws)}
                      style={{padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",
                        background:workspace===ws?"rgba(138,101,255,0.85)":"transparent",
                        color:workspace===ws?"#fff":"#9b8fff",fontWeight:workspace===ws?700:400,fontSize:12,whiteSpace:"nowrap",transition:"all .2s"}}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* タブ */}
            <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.07)",borderRadius:12,padding:3,marginBottom:20}}>
              {TABS.map((t,i)=>(
                <button key={i} onClick={()=>setTab(i)}
                  style={{flex:1,padding:"7px 0",borderRadius:8,border:"none",cursor:"pointer",
                    background:tab===i?"rgba(138,101,255,0.85)":"transparent",
                    color:tab===i?"#fff":"#9b8fff",fontWeight:tab===i?700:400,fontSize:11,transition:"all .2s"}}>
                  {t}
                </button>
              ))}
            </div>
          </div>

          <div style={{width:"100%",maxWidth:480,padding:"0 20px 64px",boxSizing:"border-box"}}>
            {tab===0&&(
              <RecordTab
                events={filteredEvents}
                records={records}
                setRecords={setRecords}
                selectedEventId={selectedEventId}
                setSelectedEventId={setSelectedEventId}
                selectedDate={selectedDate}
                setSelectedDate={setSelectedDate}
                today={today}
                setTab={setTab}
                workspace={workspace}
              />
            )}
            {tab===1&&(
              <EventTab
                events={filteredEvents}
                setEvents={setEvents}
                allEvents={events}
                selectedEventId={selectedEventId}
                setSelectedEventId={setSelectedEventId}
                workspace={workspace}
                setTab={setTab}
                records={records}
              />
            )}
            {tab===2&&(
              <ReportTab
                events={filteredEvents}
                records={records}
                today={today}
              />
            )}
            {tab===3&&(
              <SummaryTab
                events={filteredEvents}
                records={records}
                today={today}
              />
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
